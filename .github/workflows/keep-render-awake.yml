name: Keep Render Awake

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    env:
      RENDER_URL: ${{ vars.RENDER_KEEPALIVE_URL }}
    steps:
      - name: Ping Render health endpoint
        run: |
          URL="${RENDER_URL:-https://discord-scoreboard-bot.onrender.com}"
          curl -fsS --max-time 20 "$URL/health" || curl -fsS --max-time 20 "$URL" || true
