services:
  - type: web
    name: discord-scoreboard-bot
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DISCORD_TOKEN
        sync: false       # You'll paste this in Render dashboard
      - key: CLIENT_ID
        sync: false
      - key: GUILD_ID
        sync: false
      - key: DATA_BACKUP_CHANNEL_ID
        value: 1504643789069881345
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22
